<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English POP! 英文闖關樂園</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="config.js"></script>
<style>
:root{
  --ink:#2B2440; --paper:#F3EFFA; --card:#FFFFFF;
  --pink:#FF5D8F; --pink-soft:#FFE3EC;
  --yellow:#FFC53D; --yellow-soft:#FFF3D6;
  --teal:#17B9A0; --teal-soft:#DDF6F1;
  --purple:#7C5CFF; --purple-soft:#EAE4FF;
  --red:#F25555; --red-soft:#FDE2E2;
  --muted:#6E6684;
  --radius:20px;
  --shadow:0 4px 0 var(--ink);
  --font-display:'Baloo 2','Nunito','Noto Sans TC',sans-serif;
  --font-body:'Nunito','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--font-body);color:var(--ink);background:var(--paper);
  background-image:radial-gradient(#DCD3F0 1.2px, transparent 1.2px);
  background-size:22px 22px; font-size:16px;line-height:1.65;
}
#app{max-width:620px;margin:0 auto;min-height:100%;padding:0 14px 90px}
h1,h2,h3,.disp{font-family:var(--font-display)}
button{font-family:inherit;color:inherit;cursor:pointer}
input,textarea{font-family:inherit;font-size:16px;color:var(--ink)}
.hidden{display:none!important}

/* ---------- HUD ---------- */
#hud{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;
  padding:10px 4px;background:var(--paper);border-bottom:2px dashed #CFC4E8}
#hud .who{display:flex;align-items:center;gap:6px;font-weight:800;font-size:14px;
  background:var(--card);border:2px solid var(--ink);border-radius:999px;padding:4px 12px 4px 6px;box-shadow:var(--shadow)}
#hud .who .av{font-size:20px}
.pill{display:flex;align-items:center;gap:4px;font-weight:800;font-size:13px;
  background:var(--card);border:2px solid var(--ink);border-radius:999px;padding:4px 10px;box-shadow:var(--shadow)}
.pill.candy{background:var(--pink-soft)} .pill.xp{background:var(--yellow-soft)} .pill.streak{background:var(--teal-soft)}
#hud .spacer{flex:1}

/* ---------- Cards & buttons ---------- */
.card{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:20px;margin:16px 0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--font-display);font-weight:800;font-size:17px;
  background:var(--yellow);border:2px solid var(--ink);border-radius:16px;
  box-shadow:var(--shadow);padding:12px 22px;transition:transform .08s}
.btn:active{transform:translateY(4px);box-shadow:none}
.btn.pink{background:var(--pink);color:#fff}
.btn.teal{background:var(--teal);color:#fff}
.btn.purple{background:var(--purple);color:#fff}
.btn.ghost{background:var(--card)}
.btn.block{display:flex;width:100%}
.btn:disabled{opacity:.4;pointer-events:none}
.btn.small{font-size:14px;padding:8px 14px;border-radius:12px}
.tag{display:inline-block;font-size:12px;font-weight:800;border:2px solid var(--ink);
  border-radius:999px;padding:2px 10px;background:var(--purple-soft)}
.speak-btn{border:2px solid var(--ink);background:var(--teal-soft);border-radius:999px;
  width:36px;height:36px;font-size:16px;box-shadow:0 3px 0 var(--ink);flex:none;transition:transform .08s}
.speak-btn:active{transform:translateY(3px);box-shadow:none}
.eyebrow{font-size:13px;font-weight:800;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.center{text-align:center}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}

/* ---------- Section header ---------- */
.sec-head{display:flex;align-items:center;gap:12px;margin:18px 0 4px}
.sec-head .emoji{font-size:34px;background:var(--card);border:2px solid var(--ink);
  border-radius:16px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.sec-head h2{font-size:24px;line-height:1.2}
.sec-head .zh{font-size:13px;color:var(--muted);font-weight:700}
.back-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px}

/* ---------- Login ---------- */
.logo{font-family:var(--font-display);font-weight:800;font-size:40px;text-align:center;margin-top:34px;line-height:1.1}
.logo .pop{color:var(--pink);text-shadow:3px 3px 0 var(--yellow)}
.logo-sub{text-align:center;font-weight:800;color:var(--muted);margin-top:6px}
.avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
.avatar-grid button{font-size:28px;background:var(--card);border:2px solid var(--ink);
  border-radius:16px;padding:10px 0;box-shadow:0 3px 0 var(--ink)}
.avatar-grid button.sel{background:var(--yellow);transform:translateY(3px);box-shadow:none}
.name-input{width:100%;border:2px solid var(--ink);border-radius:14px;padding:12px 14px;
  font-size:17px;font-weight:700;box-shadow:inset 0 2px 0 #eee}

/* ---------- Map ---------- */
.issue-banner{background:var(--purple);color:#fff;border:2px solid var(--ink);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:20px;margin:16px 0;position:relative;overflow:hidden}
.issue-banner .lvl{position:absolute;top:14px;right:14px;background:var(--yellow);color:var(--ink);
  border:2px solid var(--ink);border-radius:999px;font-weight:800;font-size:13px;padding:2px 12px}
.issue-banner h1{font-size:26px;line-height:1.2;margin-top:4px}
.issue-banner .meta{font-size:13px;opacity:.9;font-weight:700;margin-top:6px}
.progress-track{height:14px;background:#5B3FD6;border:2px solid var(--ink);border-radius:999px;margin-top:14px;overflow:hidden}
.progress-fill{height:100%;background:var(--yellow);border-radius:999px;transition:width .5s}
.map{position:relative;padding:10px 0 30px}
.map:before{content:"";position:absolute;left:50%;top:0;bottom:0;border-left:4px dashed #CFC4E8;transform:translateX(-2px)}
.stop{position:relative;display:flex;align-items:center;gap:14px;margin:22px 0;width:58%}
.stop.right{margin-left:auto;flex-direction:row-reverse;text-align:right}
.stop .node{position:relative;z-index:1;flex:none;width:64px;height:64px;border-radius:50%;
  background:var(--card);border:3px solid var(--ink);box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;font-size:28px;transition:transform .08s}
.stop button.node:active{transform:translateY(3px);box-shadow:none}
.stop.done .node{background:var(--teal);}
.stop.now .node{background:var(--yellow);animation:bounce 1.6s infinite}
.stop.locked .node{background:#E4DEF2;filter:grayscale(1);opacity:.65}
.stop .info .t{font-family:var(--font-display);font-weight:800;font-size:15px;line-height:1.2}
.stop .info .zh{font-size:12px;color:var(--muted);font-weight:700}
.stop .check{position:absolute;top:-6px;right:-6px;background:var(--card);border:2px solid var(--ink);
  border-radius:50%;width:24px;height:24px;font-size:13px;display:flex;align-items:center;justify-content:center}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@media (prefers-reduced-motion:reduce){.stop.now .node{animation:none}}

/* ---------- Level select ---------- */
.level-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}
.level-card{background:var(--card);border:2px solid var(--ink);border-radius:18px;box-shadow:var(--shadow);
  padding:16px 10px;text-align:center;transition:transform .08s}
.level-card:active{transform:translateY(4px);box-shadow:none}
.level-card .ic{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 8px;border:2px solid var(--ink)}
.level-card .name{font-family:var(--font-display);font-weight:800;font-size:16px}
.level-card .code{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px}
.level-card .stat{font-size:12px;font-weight:800;margin-top:8px}
.level-card.reco{border-color:var(--pink);position:relative}
.level-card.reco .reco-tag{position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  background:var(--pink);color:#fff;font-size:11px;font-weight:800;padding:2px 10px;border-radius:999px;border:2px solid var(--ink)}

/* ---------- Multi-issue path map ---------- */
.imap{position:relative;padding:10px 0 30px}
.imap:before{content:"";position:absolute;left:50%;top:0;bottom:0;border-left:4px dashed #CFC4E8;transform:translateX(-2px)}
.istop{position:relative;display:flex;align-items:center;gap:14px;margin:22px 0;width:60%}
.istop.right{margin-left:auto;flex-direction:row-reverse;text-align:right}
.istop .node{position:relative;z-index:1;flex:none;width:60px;height:60px;border-radius:50%;
  background:var(--card);border:3px solid var(--ink);box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;transition:transform .08s}
.istop button.node:active{transform:translateY(3px);box-shadow:none}
.istop.done .node{background:var(--teal);color:#fff}
.istop.now .node{background:var(--purple);color:#fff;animation:bounce 1.6s infinite}
.istop.new .node{background:#E4DEF2}
.istop .info .t{font-family:var(--font-display);font-weight:800;font-size:15px;line-height:1.2}
.istop .info .zh{font-size:12px;color:var(--muted);font-weight:700}
.back-link{background:none;border:none;color:var(--muted);font-weight:800;font-size:13px;padding:6px 0}

/* ---------- Rewards center (gacha / shop / collection) ---------- */
.reward-tabs{display:flex;gap:8px;margin:14px 0}
.rtab{flex:1;font-family:var(--font-display);font-weight:800;font-size:13px;
  background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:8px 4px;box-shadow:0 3px 0 var(--ink)}
.rtab.sel{background:var(--yellow);transform:translateY(3px);box-shadow:none}
.reward-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
.reward-card{background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:10px 6px;
  text-align:center;box-shadow:0 3px 0 var(--ink)}
.reward-card .ric{font-size:30px}
.reward-card .rname{font-size:12px;font-weight:800;margin-top:4px;line-height:1.2}
.reward-card .rrare{font-size:10px;font-weight:800;color:var(--muted);margin:2px 0 6px}
.reward-card.rarity-rare{border-color:#2E86C1}
.reward-card.rarity-epic{border-color:#7C5CFF}
.reward-card.rarity-legendary{border-color:#FFC53D;box-shadow:0 3px 0 var(--ink),0 0 10px #FFC53D66}
.reward-card.equipped{background:var(--teal-soft);border-color:var(--teal)}
.card.rarity-rare{border-color:#2E86C1}
.card.rarity-epic{border-color:#7C5CFF}
.card.rarity-legendary{border-color:#FFC53D;box-shadow:0 4px 0 var(--ink),0 0 16px #FFC53D66}

/* ---------- Quiz / choices ---------- */
.choice{display:block;width:100%;text-align:left;background:var(--card);border:2px solid var(--ink);
  border-radius:14px;box-shadow:0 3px 0 var(--ink);padding:12px 14px;margin:10px 0;font-size:15px;font-weight:700;transition:transform .08s}
.choice:active{transform:translateY(3px);box-shadow:none}
.choice.correct{background:var(--teal-soft);border-color:var(--teal)}
.choice.wrong{background:var(--red-soft);border-color:var(--red)}
.combo{position:fixed;top:70px;right:16px;z-index:60;background:var(--pink);color:#fff;
  font-family:var(--font-display);font-weight:800;border:2px solid var(--ink);border-radius:999px;
  padding:6px 16px;box-shadow:var(--shadow);transform:scale(0);transition:transform .2s}
.combo.show{transform:scale(1)}
.feedback{font-weight:800;margin-top:6px;font-size:15px}
.feedback.good{color:var(--teal)} .feedback.bad{color:var(--red)}

/* ---------- Word Candy memory game ---------- */
.mem-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.mem-card{position:relative;min-height:86px;border:2px solid var(--ink);border-radius:14px;
  box-shadow:0 3px 0 var(--ink);background:var(--purple);color:#fff;
  font-weight:800;font-size:14px;padding:10px;display:flex;align-items:center;justify-content:center;
  text-align:center;transition:transform .15s}
.mem-card .face{display:none}
.mem-card.flipped,.mem-card.matched{background:var(--card);color:var(--ink)}
.mem-card.flipped .face,.mem-card.matched .face{display:block}
.mem-card.flipped .qm,.mem-card.matched .qm{display:none}
.mem-card.matched{background:var(--teal-soft);border-color:var(--teal);pointer-events:none}
.mem-card .qm{font-size:26px}
.flashcard{border:2px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);
  background:var(--card);padding:18px;margin:12px 0}
.flashcard .w{font-family:var(--font-display);font-weight:800;font-size:22px}
.flashcard .pos{font-size:12px;font-weight:800;color:var(--purple)}

/* ---------- Chat (role-play) ---------- */
.chat{display:flex;flex-direction:column;gap:10px;padding:6px 0}
.bubble{max-width:82%;border:2px solid var(--ink);border-radius:16px;padding:10px 14px;
  font-weight:700;font-size:15px;box-shadow:0 3px 0 var(--ink);animation:pop .18s}
.bubble.npc{background:var(--card);align-self:flex-start;border-bottom-left-radius:4px}
.bubble.me{background:var(--pink-soft);align-self:flex-end;border-bottom-right-radius:4px}
.bubble .zh{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.meter{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px}
.meter .track{flex:1;height:12px;border:2px solid var(--ink);border-radius:999px;background:var(--card);overflow:hidden}
.meter .fill{height:100%;background:var(--pink);transition:width .4s}

/* ---------- Grammar builder ---------- */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;border:2px dashed #CFC4E8;
  border-radius:14px;padding:8px;margin-top:8px;background:#FBF9FF}
.chip{border:2px solid var(--ink);background:var(--yellow-soft);border-radius:999px;
  font-weight:800;font-size:15px;padding:6px 14px;box-shadow:0 3px 0 var(--ink);transition:transform .08s}
.chip:active{transform:translateY(3px);box-shadow:none}

/* ---------- Writing ---------- */
.write-area{width:100%;min-height:180px;border:2px solid var(--ink);border-radius:14px;
  padding:12px;font-size:15px;line-height:1.7;resize:vertical}
.checklist{list-style:none;margin-top:12px}
.checklist li{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;padding:4px 0;color:var(--muted)}
.checklist li.ok{color:var(--teal)}
.checklist li .box{flex:none;width:22px;height:22px;border:2px solid var(--ink);border-radius:7px;
  background:var(--card);display:flex;align-items:center;justify-content:center;font-size:13px}
.checklist li.ok .box{background:var(--teal);color:#fff}

/* ---------- Boss quiz ---------- */
.boss-bar{display:flex;align-items:center;gap:10px;margin:10px 0}
.boss-bar .face{font-size:34px}
.hp{flex:1;height:16px;border:2px solid var(--ink);border-radius:999px;background:var(--card);overflow:hidden}
.hp .fill{height:100%;background:var(--red);transition:width .4s}
.timer{font-family:var(--font-display);font-weight:800;font-size:18px;background:var(--card);
  border:2px solid var(--ink);border-radius:999px;padding:2px 14px;box-shadow:0 3px 0 var(--ink)}
.timer.low{background:var(--red-soft);color:var(--red)}

/* ---------- Mic ---------- */
.mic-btn{width:84px;height:84px;border-radius:50%;border:3px solid var(--ink);background:var(--pink);
  color:#fff;font-size:34px;box-shadow:var(--shadow);transition:transform .08s;margin:10px auto;display:flex;align-items:center;justify-content:center}
.mic-btn:active{transform:translateY(4px);box-shadow:none}
.mic-btn.rec{background:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@media (prefers-reduced-motion:reduce){.mic-btn.rec{animation:none}}
.transcript{border:2px dashed #CFC4E8;border-radius:14px;background:#FBF9FF;padding:12px;min-height:60px;font-weight:700;font-size:15px;margin-top:10px}
.stars{font-size:26px;letter-spacing:4px}
.hl{background:var(--yellow);border-radius:6px;padding:0 4px;border:1.5px solid var(--ink)}

/* ---------- Toast / candy fly / confetti ---------- */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);z-index:100;
  background:var(--ink);color:#fff;font-weight:800;border-radius:999px;padding:10px 22px;
  transition:transform .3s;font-size:15px;max-width:88vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
.fly{position:fixed;z-index:99;font-size:24px;pointer-events:none;transition:all .8s cubic-bezier(.4,-0.2,.6,1.2)}
.confetti-bit{position:fixed;top:-20px;z-index:98;font-size:20px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}

/* ---------- Article ---------- */
.para{border:2px solid var(--ink);border-radius:16px;background:var(--card);box-shadow:0 3px 0 var(--ink);
  padding:14px 16px;margin:12px 0;font-size:15.5px;animation:pop .25s}
.para .row{display:flex;gap:10px;align-items:flex-start}
.goal-list{list-style:none}
.goal-list li{font-weight:700;padding:3px 0}
.expr-card{border:2px solid var(--ink);border-radius:16px;background:var(--card);box-shadow:0 3px 0 var(--ink);padding:14px;margin:12px 0}
.expr-card .en{font-family:var(--font-display);font-weight:800;font-size:18px}
.expr-card .zh{color:var(--muted);font-weight:700;font-size:14px}
.expr-card .ex{background:#FBF9FF;border:2px dashed #CFC4E8;border-radius:12px;padding:8px 12px;margin-top:8px;font-size:14px;font-weight:600}
.done-stamp{display:inline-block;background:var(--teal);color:#fff;border:2px solid var(--ink);
  border-radius:12px;font-family:var(--font-display);font-weight:800;padding:4px 14px;transform:rotate(-3deg);box-shadow:var(--shadow)}
.badge-big{font-size:80px;text-align:center;margin:10px 0}
footer.mini{color:var(--muted);font-size:12px;text-align:center;padding:24px 0;font-weight:700}
</style>
</head>
<body>
<div id="app">
  <div id="hud" class="hidden">
    <div class="who"><span class="av" id="hud-av">🦊</span><span id="hud-name">同學</span></div>
    <div class="spacer"></div>
    <button class="pill" id="hud-gift" title="獎勵中心" style="background:var(--yellow-soft)">🎁</button>
    <div class="pill xp">⭐ <span id="hud-xp">0</span></div>
    <div class="pill candy">🍬 <span id="hud-candy">0</span></div>
    <div class="pill streak">🔥 <span id="hud-streak">0</span></div>
  </div>
  <div id="stage"></div>
  <div id="toast"></div>
  <div id="combo" class="combo">COMBO ×2</div>
</div>
<script>
/* ================================================================
   English POP! 單檔互動英語雜誌
   ---------------------------------------------------------------
   ◆ CONFIG.sheetCsvUrl  之後接 Google Sheet 內容庫（目前用內建資料）
   ◆ CONFIG.progressWebhook 之後接 Apps Script，回傳學生進度給老師後台
   ================================================================ */
const CONFIG = Object.assign({
  sheetCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlJ1J_WtUax1CWaAZKVGooYoRX9Zxz01lUZTUsOM-Ts7RSgkSTO6qbabdZPtOOCWJKQ75cIMXnIUpW/pub?gid=0&single=true&output=csv",        // TODO: Google Sheet 發布網址
  progressWebhook: ""     // TODO: Apps Script Web App 網址
}, window.ENGLISHPOP_CONFIG || {});

/* ============ Issue 資料（未來由 Google Sheet 載入，一列一期） ============ */
const ISSUES = [{
  id:"01", title:"How to Make New Friends", level:"B1", tier:3, time:"30–40 分鐘",
  goals:["用英文自然地自我介紹","詢問別人的興趣和生活","使用追問句延續對話","完成一段一分鐘的英文口說"],
  warmup:{ intro:"先不要查單字，試著用英文回答（打字或用說的都可以）！",
    questions:[
      {q:"Is it easy or difficult for you to make new friends?", hint:"可以用 It is easy / difficult for me because... 開頭"},
      {q:"Where do you usually meet new people?", hint:"例如 at school, at work, online..."},
      {q:"What do you usually say when you meet someone for the first time?", hint:"例如 Hi, my name is..."}
    ]},
  cover:{ before:"看到標題 “How to Make New Friends”，你猜這篇文章會談什麼？",
    paragraphs:[

/* ============ 從 Google Sheet 載入 Issue（CONFIG.sheetCsvUrl） ============
   老師只要在 Google Sheet 貼上「一列 = 一期」的內容，發布成 CSV 後，
   這裡會自動解析成跟上面 ISSUES 一樣的結構。詳細欄位格式請見 docs/sheet-column-guide.md
   （沒有設定 sheetCsvUrl 時，網站會直接使用內建的 Issue 01 當範例）。
=========================================================================== */
function splitLines(s){ return String(s||"").split(/\r?\n/).map(x=>x.trim()).filter(Boolean); }
function splitSemi(s){ return String(s||"").split(";").map(x=>x.trim()).filter(Boolean); }
function kv(line){ const m=line.match(/^([A-Z]+):\s*(.*)$/); return m?{k:m[1],v:m[2]}:{k:"",v:line}; }

function parseWarmup(cell){
  const lines=splitLines(cell); const intro=lines[0]||""; const questions=[];
  lines.slice(1).forEach(l=>{ const [q,hint]=l.split("|"); if(q) questions.push({q:q.trim(), hint:(hint||"").trim()}); });
  return {intro, questions};
}
function parseCover(cell){
  const blocks=String(cell||"").split(/\n\s*\n/).map(x=>x.trim()).filter(Boolean);
  return {before:blocks[0]||"", paragraphs:blocks.slice(1)};
}
function parseReading(cell){
  return String(cell||"").split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean).map(block=>{
    const lines=splitLines(block); let q="",opts=[],ans=-1,explain="";
    lines.forEach(l=>{ const {k,v}=kv(l);
      if(k==="Q") q=v; else if(["A","B","C","D"].includes(k)) opts.push(v);
      else if(k==="ANS") ans=/^\d+$/.test(v)?+v:-1; else if(k==="EXPLAIN") explain=v; });
    return {q,opts,ans,explain};
  });
}
function parseWords(cell){
  return splitLines(cell).map(l=>{ const [w,pos,zh,def,ex]=l.split("|").map(x=>(x||"").trim());
    return {w,pos,zh,def,ex}; }).filter(x=>x.w);
}
function parseExpressions(cell){
  return splitLines(cell).map(l=>{ const [en,zh,when,exA,exB]=l.split("|").map(x=>(x||"").trim());
    return {en,zh,when,exA,exB}; }).filter(x=>x.en);
}
function parseGrammar(cell){
  const lines=splitLines(cell); const g={name:"",pattern:"",explain:"",examples:[],practice:[]};
  lines.forEach(l=>{ const {k,v}=kv(l);
    if(k==="NAME") g.name=v; else if(k==="PATTERN") g.pattern=v; else if(k==="EXPLAIN") g.explain=v;
    else if(k==="EXAMPLES") g.examples=splitSemi(v);
    else if(k==="PRACTICE"){ const [q,optsRaw,ansRaw]=v.split("||").map(x=>(x||"").trim());
      const opts=splitSemi(optsRaw||""); g.practice.push({type:"choice", q, opts, ans:+ansRaw||0}); } });
  return g;
}
function parseSpeakup(cell){
  const s={topic:"",talkAbout:[],starters:[],targets:[],sample:""};
  splitLines(cell).forEach(l=>{ const {k,v}=kv(l);
    if(k==="TOPIC") s.topic=v; else if(k==="TALK") s.talkAbout=splitSemi(v);
    else if(k==="STARTERS") s.starters=splitSemi(v); else if(k==="TARGETS") s.targets=splitSemi(v.toLowerCase());
    else if(k==="SAMPLE") s.sample=v; });
  return s;
}
function parseRoleplay(cell){
  const r={situation:"",npcName:"NPC",npcAv:"🧑",turns:[],endings:{high:"",mid:"",low:""}};
  splitLines(cell).forEach(l=>{ const {k,v}=kv(l);
    if(k==="SITUATION") r.situation=v; else if(k==="NPC") r.npcName=v;
    else if(k==="TURN"){ const [npc,optsRaw]=v.split("||"); const opts=splitSemi(optsRaw||"").map(o=>{
        const [t,zh,pt]=o.split(":::").map(x=>(x||"").trim()); return {t,zh,pt:+pt||0}; });
      r.turns.push({npc:(npc||"").trim(), opts}); }
    else if(k==="END_HIGH") r.endings.high=v; else if(k==="END_MID") r.endings.mid=v; else if(k==="END_LOW") r.endings.low=v; });
  return r;
}
function parseWriting(cell){
  const w={topic:"",guide:[],vocab:[],exprs:[],sample:""};
  splitLines(cell).forEach(l=>{ const {k,v}=kv(l);
    if(k==="TOPIC") w.topic=v; else if(k==="GUIDE") w.guide=splitSemi(v);
    else if(k==="VOCAB") w.vocab=splitSemi(v.toLowerCase()); else if(k==="EXPR") w.exprs=splitSemi(v.toLowerCase());
    else if(k==="SAMPLE") w.sample=v; });
  return w;
}
function parseQuiz(cell){
  const lines=splitLines(cell); let time=90; const questions=[];
  lines.forEach(l=>{ const {k,v}=kv(l); if(k==="TIME"){ time=+v||90; return; }
    const [q,optsRaw,ansRaw]=l.split("||").map(x=>(x||"").trim());
    if(q) questions.push({q, opts:splitSemi(optsRaw||""), ans:+ansRaw||0}); });
  return {time, questions};
}
function parseMission(cell){
  const m={goal:"",rules:[],report:[]};
  splitLines(cell).forEach(l=>{ const {k,v}=kv(l);
    if(k==="GOAL") m.goal=v; else if(k==="RULES") m.rules=splitSemi(v);
    else if(k==="REPORT") m.report=splitSemi(v).map(q=>({q})); });
  return m;
}
function rowToIssue(row){
  return {

}

/* ============ 連擊 + 糖果追蹤（Reading / Grammar / Quiz 共用） ============
   規則：答對 +基本糖果，連擊達到門檻（×3 / ×5 / ×8）額外加碼。
   答錯連續 ≥3 題、且平均作答時間 <2 秒（像在亂猜），跳一句溫和提醒——
   純粹提醒，不會扣糖果、不會扣 XP，避免讓學生覺得被處罰。
=========================================================================== */
function newCombo(){ return {combo:0, best:0, candy:0, wrongStreak:0, times:[], warned:false, shownAt:0}; }
function comboMark(t){ t.shownAt=Date.now(); }
function comboAnswer(t, correct, baseCandy){
  baseCandy = baseCandy===undefined ? 1 : baseCandy;
  t.times.push(Date.now()-(t.shownAt||Date.now()));
  if(correct){
    t.candy+=baseCandy;
    t.combo++; t.best=Math.max(t.best,t.combo); t.wrongStreak=0; t.warned=false;
    [[3,2],[5,4],[8,6]].forEach(([th,bonus])=>{
      if(t.combo===th){ t.candy+=bonus; toast("🔥 連擊 ×"+th+"！額外 +"+bonus+" 🍬"); }
    });
  }else{
    t.combo=0; t.wrongStreak++;
    if(!t.warned && t.wrongStreak>=3){
      const recent=t.times.slice(-3);
      const avg=recent.reduce((a,b)=>a+b,0)/recent.length;
      if(avg<2000){ toast("🤔 要不要放慢一點，重新讀一次題目？"); t.warned=true; }
    }
  }
}
function confetti(){

}
/* ============ 語音：TTS 與語音辨識 ============ */
let voiceEN=null;
function pickVoice(){ const vs=speechSynthesis.getVoices();
  voiceEN = vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null; }
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text, rate){
  if(!("speechSynthesis" in window)){ toast("這個瀏覽器不支援朗讀"); return; }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; if(voiceEN) u.voice=voiceEN; u.rate=rate||0.92;
  speechSynthesis.speak(u);
}
const ASR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
function listen(onResult, onEnd, onErr){
  const r=new ASR(); r.lang="en-US"; r.interimResults=true; r.continuous=true;
  let finalTxt="";
  r.onresult=e=>{ let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) finalTxt+=e.results[i][0].transcript+" ";
      else interim+=e.results[i][0].transcript; }
    onResult(finalTxt, interim); };
  r.onend=()=>onEnd&&onEnd(finalTxt);
  r.onerror=e=>onErr&&onErr(e);
  r.start(); return r;
}
function similarity(a,b){
  const norm=s=>s.toLowerCase().replace(/[^a-z' ]/g," ").split(/\s+/).filter(Boolean);
  const wa=norm(a), wb=new Set(norm(b));
  if(!wa.length) return 0;
  let hit=0; wa.forEach(w=>{ if(wb.has(w)) hit++; });
  return hit/wa.length;
}

  const idx=SECTIONS.findIndex(s=>s.key===key);

function renderSection(issue, key){

/* ============ 🔍 Reading Check（連擊戰） ============ */
function renderReading(issue){
  const qs=issue.reading; let i=0, score=0; const t=newCombo();
  sectionShell(issue,"reading",`
    <div class="card"><p style="font-weight:700">答對會累積 <b>COMBO 連擊</b>，連擊越高糖果加碼！答錯不扣分，但連擊會歸零 😆</p></div>
    <div id="rc-box"></div>`);
  function showCombo(){
    const c=$("#combo");
    if(t.combo>=2){ c.textContent="COMBO ×"+t.combo; c.classList.add("show"); setTimeout(()=>c.classList.remove("show"),1200); }
  }
  function show(){
    const q=qs[i]; const open=q.ans===-1;
    comboMark(t);
    $("#rc-box").innerHTML=`
      <div class="card">
        <div class="eyebrow">Q${i+1} / ${qs.length} ${t.combo>=2?("· 🔥 combo ×"+t.combo):""}</div>
        <div class="mt8" style="display:flex;gap:10px;align-items:flex-start">
          <button class="speak-btn" id="rc-tts">🔊</button>
          <p style="font-weight:800">${esc(q.q)}</p>
        </div>
        <div class="mt8" id="rc-opts">
          ${q.opts.map((o,k)=>`<button class="choice" data-k="${k}">${String.fromCharCode(65+k)}. ${esc(o)}</button>`).join("")}
        </div>
        <div id="rc-fb"></div>
      </div>`;
    $("#rc-tts").onclick=()=>speak(q.q.replace(/^💭.*—/,""));
    $("#rc-opts").addEventListener("click",e=>{
      const b=e.target.closest(".choice"); if(!b) return;
      document.querySelectorAll("#rc-opts .choice").forEach(x=>x.style.pointerEvents="none");
      const k=+b.dataset.k;
      if(open){ b.classList.add("correct");
        $("#rc-fb").innerHTML='<div class="feedback good">💡 很棒的選擇！這題沒有標準答案。</div>';
        comboAnswer(t,true,1); score++; showCombo();
        setTimeout(nextQ,900); return; }
      if(k===q.ans){ b.classList.add("correct"); comboAnswer(t,true,1); score++;
        $("#rc-fb").innerHTML='<div class="feedback good">✅ 答對了！'+(q.explain?esc(q.explain):"")+'</div>';
        showCombo(); setTimeout(nextQ,900);
      }else{
        b.classList.add("wrong"); comboAnswer(t,false);
        const right=document.querySelector('#rc-opts .choice[data-k="'+q.ans+'"]');
        $("#rc-fb").innerHTML='<div class="feedback bad">💥 Combo 中斷！正確答案亮起來了。'+(q.explain?" "+esc(q.explain):"")+'</div>';
        setTimeout(()=>{ right.classList.add("correct"); },400);
        setTimeout(nextQ,1800);
      }
    });
  }
  function nextQ(){
    if(i<qs.length-1){ i++; show(); }
    else{
      const xp=10*score + t.best*5;
      stage().querySelector("#rc-box").innerHTML=`
        <div class="card center">
          <div class="badge-big">${score>=4?"🌟":"💪"}</div>
          <h2 class="disp">答對 ${score} / ${qs.length} 題</h2>
          <p style="font-weight:700">最高連擊 ×${t.best} ｜ 獲得 ⭐ ${xp} XP ｜ 🍬 ${t.candy}</p>
          <button class="btn pink block mt16" id="rc-fin">收下獎勵！</button>
        </div>`;
      $("#rc-fin").onclick=()=>completeSection(issue,"reading",{xp, candy:t.candy, data:{score, best:t.best}});
    }
  }
  show();
}

/* ============ 🍭 Word Candy ============ */
function renderCandy(issue){
  sectionShell(issue,"candy",`
    <div class="card"><p style="font-weight:700">先翻翻 <b>單字卡</b> 認識 5 個新字，然後玩 <b>記憶配對</b>——每配對成功就掉 1 顆糖進你的糖果罐 🍬</p></div>
    <div class="eyebrow">STEP 1 · 單字卡（點 🔊 聽發音）</div>
    <div id="wc-cards"></div>
    <button class="btn purple block" id="wc-play">我記好了，開始配對遊戲 🎮</button>
    <div class="hidden" id="wc-game">
      <div class="eyebrow mt24">STEP 2 · 記憶配對：把單字和意思配成對</div>
      <div class="mem-grid" id="wc-grid"></div>
      <div class="center mt8" style="font-weight:800" id="wc-count"></div>
    </div>`);
  $("#wc-cards").innerHTML = issue.words.map(w=>`
    <div class="flashcard">
      <div style="display:flex;gap:10px;align-items:center">
        <button class="speak-btn" data-say="${esc(w.w)}">🔊</button>
        <div><span class="w">${esc(w.w)}</span> <span class="pos">${esc(w.pos)}</span>
          <div style="font-weight:800">${esc(w.zh)} · <span style="color:var(--muted);font-weight:600">${esc(w.def)}</span></div></div>
      </div>
      <div class="ex" style="background:#FBF9FF;border:2px dashed #CFC4E8;border-radius:12px;padding:8px 12px;margin-top:8px;font-size:14px;font-weight:600">
        ✏️ ${esc(w.ex)} <button class="speak-btn" style="width:28px;height:28px;font-size:12px" data-say="${esc(w.ex)}">🔊</button></div>
    </div>`).join("");
  $("#wc-cards").addEventListener("click",e=>{ const b=e.target.closest("[data-say]"); if(b) speak(b.dataset.say); });
  $("#wc-play").onclick=()=>{
    $("#wc-play").classList.add("hidden"); $("#wc-game").classList.remove("hidden");
    startMatch();
    sIV($("#wc-game"));
  };
  function startMatch(){
    const pairs=issue.match;
    let cells=[];
    pairs.forEach((p,i)=>{ cells.push({id:i,txt:p.w,kind:"w"}); cells.push({id:i,txt:p.m,kind:"m"}); });
    cells.sort(()=>Math.random()-.5);
    let matched=0, open=null, lock=false;
    $("#wc-count").textContent="已配對 0 / "+pairs.length;
    $("#wc-grid").innerHTML=cells.map((c,k)=>`
      <button class="mem-card" data-id="${c.id}" data-k="${k}">
        <span class="qm">🍬</span><span class="face">${esc(c.txt)}</span>
      </button>`).join("");
    $("#wc-grid").addEventListener("click",e=>{
      const b=e.target.closest(".mem-card"); if(!b||lock||b.classList.contains("flipped")||b.classList.contains("matched")) return;
      b.classList.add("flipped");
      if(b.dataset.id!==undefined && cells[+b.dataset.k].kind==="w") speak(cells[+b.dataset.k].txt);
      if(!open){ open=b; return; }
      lock=true;
      if(open.dataset.id===b.dataset.id && open!==b){
        setTimeout(()=>{ open.classList.add("matched"); b.classList.add("matched");
          matched++; flyCandy(b,1); toast("🍬 配對成功！");
          $("#wc-count").textContent="已配對 "+matched+" / "+pairs.length;
          open=null; lock=false;
          if(matched===pairs.length){
            setTimeout(()=>completeSection(issue,"candy",{xp:25, candy:1, data:{score:matched}}),700);
          }
        },350);
      }else{
        setTimeout(()=>{ open.classList.remove("flipped"); b.classList.remove("flipped"); open=null; lock=false; },800);
      }
    });
  }
}

/* ============ 💬 Say It Naturally ============ */
function renderSayIt(issue){
  const ex=issue.expressions; let doneCount=0; const doneSet=new Set();
  sectionShell(issue,"sayit",`
    <div class="card"><p style="font-weight:700">5 句超實用口語！每一句：先按 🔊 聽示範，再${ASR?"按 🎙️ 大聲跟讀，看看能拿幾顆星":"大聲跟讀 3 次，然後按「我唸完了」"}。不方便開口的話，也可以改用打字練習。</p></div>
    <div id="si-list"></div>
    <button class="btn pink block hidden" id="si-fin">全部練完，完成！</button>`);
  $("#si-list").innerHTML = ex.map((e,i)=>`
    <div class="expr-card" data-i="${i}">
      <div style="display:flex;gap:10px;align-items:center">
        <button class="speak-btn si-tts">🔊</button>
        <div><div class="en">${esc(e.en)}</div><div class="zh">${esc(e.zh)}</div></div>
      </div>
      <div style="font-size:13px;color:var(--muted);font-weight:700;margin-top:6px">🕐 ${esc(e.when)}</div>
      <div class="ex">A: ${esc(e.exA)}<br>B: ${esc(e.exB)} <button class="speak-btn si-ex" style="width:28px;height:28px;font-size:12px">🔊</button></div>
      <div class="mt8" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${ASR?'<button class="btn small teal si-mic">🎙️ 跟讀挑戰</button>':'<button class="btn small teal si-self">✅ 我唸完了</button>'}
        <button class="btn small ghost si-type">⌨️ 麥克風不方便？改用打字</button>
        <span class="stars si-stars"></span>
      </div>
      <div class="mt8 hidden si-typebox">
        <input class="name-input si-typein" placeholder="Type the sentence here...">
        <button class="btn small pink mt8 si-typesubmit">確認</button>
      </div>
      <div class="transcript hidden si-heard"></div>
    </div>`).join("");
  const list=$("#si-list");
  list.addEventListener("click",ev=>{
    const card=ev.target.closest(".expr-card"); if(!card) return;
    const i=+card.dataset.i, e=ex[i];
    if(ev.target.closest(".si-tts")) speak(e.en);
    if(ev.target.closest(".si-ex")) speak(e.exA+" ... "+e.exB);
    if(ev.target.closest(".si-self")){ markDone(card,i,3); }
    if(ev.target.closest(".si-type")){
      card.querySelector(".si-typebox").classList.toggle("hidden");
      const input=card.querySelector(".si-typein"); if(input) input.focus();
    }
    if(ev.target.closest(".si-typesubmit")) submitTyped(card,i,e);
    if(ev.target.closest(".si-mic")){
      const btn=ev.target.closest(".si-mic"), heard=card.querySelector(".si-heard");
      if(btn._rec){ btn._rec.stop(); return; }
      heard.classList.remove("hidden"); heard.textContent="🔴 請大聲說： "+e.en;
      btn.textContent="⏹ 結束";
      btn._rec=listen((fin,inter)=>{ heard.textContent=(fin+inter)||"…聽你說…"; },
        fin=>{ btn._rec=null; btn.textContent="🎙️ 跟讀挑戰";
          const sim=similarity(e.en, fin);
          const stars= sim>=0.8?3 : sim>=0.5?2 : sim>0?1:0;
          if(stars===0){ heard.textContent="沒聽清楚，再試一次！（也可以改用打字練習）"; return; }
          markDone(card,i,stars);
        },
        ()=>{ btn._rec=null; btn.textContent="🎙️ 跟讀挑戰"; toast("麥克風沒有回應，可以改用打字練習"); heard.innerHTML='<button class="btn small ghost si-self">✅ 我唸完了（自評）</button>'; });
    }
  });
  list.addEventListener("keydown",ev=>{
    if(ev.key!=="Enter") return;
    const input=ev.target.closest(".si-typein"); if(!input) return;
    const card=ev.target.closest(".expr-card"); const i=+card.dataset.i, e=ex[i];
    submitTyped(card,i,e);
  });
  function submitTyped(card,i,e){
    const input=card.querySelector(".si-typein");
    const val=input.value.trim();
    if(!val){ toast("先打打看這句英文再確認喔！"); return; }
    const sim=similarity(e.en, val);
    const stars= sim>=0.8?3 : sim>=0.5?2 : sim>0?1:0;
    if(stars===0){ toast("再看一次句子，試著打出完整的句子！"); return; }
    markDone(card,i,stars);
    card.querySelector(".si-typebox").classList.add("hidden");
  }
  function markDone(card,i,stars){
    card.querySelector(".si-stars").textContent="⭐".repeat(stars);
    if(!doneSet.has(i)){ doneSet.add(i); doneCount++; toast("完成 "+doneCount+"/"+ex.length+" 句！"); }
    if(doneCount>=ex.length) $("#si-fin").classList.remove("hidden");
  }
  $("#si-fin").onclick=()=>completeSection(issue,"sayit",{xp:25, candy:1, data:{score:doneCount}});
}

      }
      $("#gb-box").onclick=e=>{
        const c=e.target.closest(".chip"); if(!c) return;
        const k=+c.dataset.k;
        if(c.dataset.from==="pool"){ built.push(pool.splice(k,1)[0]); } else { pool.push(built.splice(k,1)[0]); }
        draw();
      };
      draw();
    } else {
      $("#gb-box").innerHTML=`
        <div class="card">
          <div class="eyebrow">挑戰 ${step+1}/${practice.length} ${t.combo>=2?("· 🔥 combo ×"+t.combo):""}</div>
          <p class="mt8" style="font-weight:800">${esc(p.q)}</p>
          <div id="gb-opts">${p.opts.map((o,k)=>`<button class="choice" data-k="${k}">${String.fromCharCode(65+k)}. ${esc(o)}</button>`).join("")}</div>
          <div id="gb-fb"></div>
        </div>`;
      $("#gb-opts").onclick=e=>{
        const b=e.target.closest(".choice"); if(!b) return;
        document.querySelectorAll("#gb-opts .choice").forEach(x=>x.style.pointerEvents="none");
        if(+b.dataset.k===p.ans){ b.classList.add("correct"); comboAnswer(t,true,2); correct++;
          $("#gb-fb").innerHTML='<div class="feedback good">✅ 答對了！</div>'; setTimeout(nextStep,900); }
        else{ b.classList.add("wrong"); comboAnswer(t,false);
          document.querySelector('#gb-opts .choice[data-k="'+p.ans+'"]').classList.add("correct");
          $("#gb-fb").innerHTML='<div class="feedback bad">再看一次正確答案 👀</div>'; setTimeout(nextStep,1700); }
      };
    }

  function nextStep(){
    step++;
    if(step<practice.length) show();
    else{
      const xp=15+correct*8;
      $("#gb-box").innerHTML=`<div class="card center">
        <div class="badge-big">🧩</div>
        <h2 class="disp">答對 ${correct}/${practice.length}</h2>

      $("#gb-fin").onclick=()=>completeSection(issue,"grammar",{xp, candy:t.candy, data:{score:correct}});
    }
  }
}

/* ============ 🧑‍🤝‍🧑 Role-Play ============ */
function renderRoleplay(issue){
  const rp=issue.roleplay; let turn=0, pts=0; const maxPts=rp.turns.reduce((a,t)=>a+Math.max(...t.opts.map(o=>o.pt)),0);
  sectionShell(issue,"roleplay",`
    <div class="card"><p style="font-weight:700">${esc(rp.situation)}</p>
      <div class="meter mt8">💗 好感度 <div class="track"><div class="fill" id="rp-meter" style="width:0%"></div></div></div>
    </div>
    <div class="chat" id="rp-chat"></div>
    <div class="card" id="rp-opts-box"><div class="eyebrow">選一句回應（點 🔊 先聽，選了就大聲唸！）</div><div id="rp-opts"></div></div>`);
  const chat=$("#rp-chat");
  function npcSay(text){
    const d=document.createElement("div"); d.className="bubble npc";
    d.innerHTML=`<b>${rp.npcAv} ${esc(rp.npcName)}：</b> ${esc(text)} <button class="speak-btn" style="width:26px;height:26px;font-size:11px">🔊</button>`;
    d.querySelector("button").onclick=()=>speak(text);
    chat.appendChild(d); speak(text);
    sIV(d,{behavior:"smooth",block:"center"});
  }
  function meSay(text){
    const d=document.createElement("div"); d.className="bubble me";
    d.innerHTML=`${esc(text)}`;
    chat.appendChild(d); sIV(d,{behavior:"smooth",block:"center"});
  }
  function showTurn(){
    const t=rp.turns[turn]; npcSay(t.npc);
    $("#rp-opts").innerHTML=t.opts.map((o,k)=>`
      <button class="choice" data-k="${k}">
        <span style="display:flex;gap:8px;align-items:center">
          <span class="speak-btn rp-listen" style="width:28px;height:28px;font-size:12px">🔊</span>
          <span>${esc(o.t.replace("{name}", S.student.name))}<span style="display:block;font-size:12px;color:var(--muted)">${esc(o.zh)}</span></span>
        </span>
      </button>`).join("");
    $("#rp-opts").onclick=e=>{
      const lb=e.target.closest(".rp-listen");
      const b=e.target.closest(".choice"); if(!b) return;
      const o=t.opts[+b.dataset.k]; const line=o.t.replace("{name}", S.student.name);
      if(lb){ speak(line); e.stopPropagation(); return; }
      pts+=o.pt;
      $("#rp-meter").style.width=Math.round(pts/maxPts*100)+"%";
      meSay(line); speak(line);
      if(o.pt>=2) toast("💗 Leo 好感度上升！");
      $("#rp-opts").innerHTML=""; turn++;
      setTimeout(()=>{ if(!$("#rp-opts")&&!$("#rp-opts-box")) return; if(turn<rp.turns.length) showTurn(); else ending(); },1400);
    };
  }
  function ending(){
    const ratio=pts/maxPts;
    const msg= ratio>=0.8?rp.endings.high : ratio>=0.4?rp.endings.mid : rp.endings.low;
    if(ratio>=0.8) confetti();
    $("#rp-opts-box").innerHTML=`
      <div class="center">
        <div class="badge-big">${ratio>=0.8?"💖":ratio>=0.4?"🙂":"😅"}</div>
        <p style="font-weight:800">${esc(msg)}</p>
        <p style="font-weight:700;color:var(--muted)">好感度 ${pts} / ${maxPts}</p>
        <button class="btn small ghost mt8" id="rp-again">🔁 再玩一次</button>
        <button class="btn pink block mt16" id="rp-fin">完成 Role-Play！</button>
      </div>`;
    $("#rp-again").onclick=()=>renderRoleplay(issue);
    $("#rp-fin").onclick=()=>completeSection(issue,"roleplay",{xp:20+Math.round(ratio*20), candy:2, data:{score:pts, max:maxPts}});
  }
  showTurn();
}

      $("#qz-box").innerHTML=`<div class="card center">

      else{ $("#qz-retry").onclick=()=>renderQuiz(issue); $("#qz-back").onclick=()=>renderMap(issue); }

/* ============ 🎁 獎勵中心：扭蛋 / 商店 / 收藏 ============ */
const GACHA_COST = 20;
function rollRarity(){
  const r=Math.random()*100;
  if(r<2) return "legendary";
  if(r<12) return "epic";
  if(r<40) return "rare";
  return "common";
}
function gachaDraw(){
  if(S.candy<GACHA_COST){ toast("糖果不夠喔！完成任務賺糖果吧 🍬"); return null; }
  S.candy-=GACHA_COST;
  let rarity=rollRarity();
  S.pity=(S.pity||0)+1;
  if(rarity==="common" && S.pity>=10){ rarity = Math.random()<0.5?"epic":"rare"; }
  if(rarity!=="common") S.pity=0;
  const pool=REWARDS.filter(r=>r.rarity===rarity);
  const item=pool[Math.floor(Math.random()*pool.length)];
  let refunded=0;
  if(S.collection.owned[item.id]){ refunded=Math.round(item.price*0.5); S.candy+=refunded; }
  else S.collection.owned[item.id]=true;
  save(); updateHUD();
  return {item, refunded};
}
function buyReward(id){
  const item=REWARDS.find(r=>r.id===id); if(!item) return;
  if(S.collection.owned[id]){ toast("你已經有這個了！"); return; }
  if(S.candy<item.price){ toast("糖果不夠喔！完成任務賺糖果吧 🍬"); return; }
  S.candy-=item.price; S.collection.owned[id]=true; save(); updateHUD();
  toast("🎉 兌換成功："+item.name);
  renderRewards("shop");
}
function equipReward(id){
  const item=REWARDS.find(r=>r.id===id); if(!item || !S.collection.owned[id]) return;
  if(!["theme","frame","title"].includes(item.type)) return;
  S.collection.equipped[item.type] = (S.collection.equipped[item.type]===id) ? null : id;
  save(); applyEquipped(); updateHUD();
  renderRewards("collection");
}
let REWARD_TAB="gacha";
function renderRewards(tab){
  REWARD_TAB = tab || REWARD_TAB;
  $("#hud").classList.remove("hidden"); updateHUD();
  const ownedCount=Object.keys(S.collection.owned).length;
  stage().innerHTML = `
    <button class="back-link" id="rw-back">← 回選單</button>
    <div class="card center" style="padding:14px 10px">
      <div class="disp" style="font-size:20px;font-weight:800">🎁 獎勵中心</div>
      <div class="zh" style="color:var(--muted);font-weight:700;font-size:12px">已收集 ${ownedCount} / ${REWARDS.length} 種</div>
    </div>
    <div class="reward-tabs">
      <button class="rtab ${REWARD_TAB==='gacha'?'sel':''}" data-t="gacha">🎰 扭蛋</button>
      <button class="rtab ${REWARD_TAB==='shop'?'sel':''}" data-t="shop">🛍️ 商店</button>
      <button class="rtab ${REWARD_TAB==='collection'?'sel':''}" data-t="collection">📦 收藏</button>
    </div>
    <div id="rw-body"></div>
    <footer class="mini">English POP! · 免費非營利英語學習</footer>`;
  $("#rw-back").onclick=()=>renderLevels();
  document.querySelectorAll(".rtab").forEach(b=>b.onclick=()=>renderRewards(b.dataset.t));
  if(REWARD_TAB==="shop") renderShopBody();
  else if(REWARD_TAB==="collection") renderCollectionBody();
  else renderGachaBody();
}
function renderGachaBody(){
  $("#rw-body").innerHTML = `
    <div class="card center">
      <div style="font-size:56px">🎰</div>
      <p style="font-weight:800">扭一次 ${GACHA_COST} 🍬（目前有 ${S.candy} 🍬）</p>
      <p style="font-size:12px;color:var(--muted);font-weight:700">機率：一般 60% · 稀有 28% · 史詩 10% · 傳說 2%<br>連續 10 抽沒中稀有以上，第 10 抽必出稀有／史詩！</p>
      <button class="btn pink block mt16" id="gacha-go">🎰 扭一下！</button>
    </div>
    <div id="gacha-result"></div>`;
  $("#gacha-go").onclick=()=>{
    const res=gachaDraw(); if(!res) return;
    const r=res.item;
    if(r.rarity==="epic"||r.rarity==="legendary") confetti();
    $("#gacha-result").innerHTML = `
      <div class="card center rarity-${r.rarity}">
        <div style="font-size:52px">${r.emoji}</div>
        <div style="font-weight:800;font-size:18px">${esc(r.name)}</div>
        <span class="tag mt8">${rarityLabel(r.rarity)}</span>
        ${res.refunded?`<p style="font-size:12px;color:var(--muted);margin-top:8px">已擁有，退還 ${res.refunded} 🍬</p>`:`<p style="font-size:12px;color:var(--teal);font-weight:800;margin-top:8px">🎉 新獲得！收藏冊看得到</p>`}
      </div>`;
  };
}
let SHOP_SORT="price_asc";
function sortRewards(list, mode){
  const rarityOrder={common:0,rare:1,epic:2,legendary:3};
  const typeLabel={theme:"🎨 主題色",frame:"🖼️ 頭像框",title:"🏷️ 稱號",badge:"🏅 徽章",sticker:"✨ 貼紙"};
  const arr=list.slice();
  switch(mode){
    case "price_desc": arr.sort((a,b)=>b.price-a.price); break;
    case "rarity": arr.sort((a,b)=>(rarityOrder[b.rarity]-rarityOrder[a.rarity]) || a.price-b.price); break;
    case "name": arr.sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant')); break;
    case "type": arr.sort((a,b)=>typeLabel[a.type].localeCompare(typeLabel[b.type],'zh-Hant') || a.price-b.price); break;
    default: arr.sort((a,b)=>a.price-b.price);
  }
  return arr;
}
function renderShopBody(){
  const sorted=sortRewards(REWARDS, SHOP_SORT);
  $("#rw-body").innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <select id="shop-sort" style="border:2px solid var(--ink);border-radius:10px;padding:6px 10px;font-weight:800;font-size:13px;background:var(--card)">
        <option value="price_asc">💰 價格：低到高</option>
        <option value="price_desc">💰 價格：高到低</option>
        <option value="rarity">✨ 稀有度：高到低</option>
        <option value="name">🔤 名稱</option>
        <option value="type">🗂️ 分類</option>
      </select>
    </div>
    <div class="reward-grid">${sorted.map(r=>{
      const owned=!!S.collection.owned[r.id];
      return `<div class="reward-card rarity-${r.rarity}">
        <div class="ric">${r.emoji}</div>
        <div class="rname">${esc(r.name)}</div>
        <div class="rrare">${rarityLabel(r.rarity)}</div>
        ${owned?'<span class="tag">已擁有</span>':`<button class="btn small teal" data-buy="${r.id}">${r.price} 🍬</button>`}
      </div>`;
    }).join("")}</div>`;
  $("#shop-sort").value=SHOP_SORT;
  $("#shop-sort").onchange=(e)=>{ SHOP_SORT=e.target.value; renderShopBody(); };
  document.querySelectorAll("[data-buy]").forEach(b=>b.onclick=()=>buyReward(b.dataset.buy));
}
function renderCollectionBody(){
  const owned=REWARDS.filter(r=>S.collection.owned[r.id]);
  if(!owned.length){ $("#rw-body").innerHTML=`<p class="center mt24" style="color:var(--muted);font-weight:700">還沒有收藏，快去扭蛋或商店逛逛！</p>`; return; }
  $("#rw-body").innerHTML = `<div class="reward-grid">${owned.map(r=>{
    const equipable=["theme","frame","title"].includes(r.type);
    const equipped=equipable && S.collection.equipped[r.type]===r.id;
    return `<div class="reward-card rarity-${r.rarity} ${equipped?'equipped':''}">
      <div class="ric">${r.emoji}</div>
      <div class="rname">${esc(r.name)}</div>
      <div class="rrare">${rarityLabel(r.rarity)}</div>
      ${equipable?`<button class="btn small ${equipped?'pink':'ghost'}" data-equip="${r.id}">${equipped?'✓ 使用中':'套用'}</button>`:''}
    </div>`;
  }).join("")}</div>`;
  document.querySelectorAll("[data-equip]").forEach(b=>b.onclick=()=>equipReward(b.dataset.equip));
}

/* ============ 📄 匯出 PDF 給老師討論 ============
   中文和 emoji 用 jsPDF 內建字型畫文字會變亂碼（PDF 標準字型不含中文字），
   所以改成：先把報告排版成一段 HTML，用 html2canvas 把它「畫成圖片」
   （跟網頁上看到的中文、emoji 完全一樣），再把圖片切頁放進 PDF。
================================================================= */
function exportIssuePDF(issue){
  if(!window.jspdf || !window.html2canvas){ toast("PDF 元件載入中，請稍後再試一次"); return; }
  const { jsPDF } = window.jspdf;
  const p=issueProg(issue.id);
  const doneCount=SECTIONS.filter(s=>p.done[s.key]).length;

  function row(key,rec){
    switch(key){
      case "warmup":
        return (rec.answers||[]).map((ans,i)=>`
          <div style="font-size:14px;font-weight:700;margin-top:8px">Q${i+1}. ${esc(issue.warmup.questions[i]?issue.warmup.questions[i].q:"")}</div>
          <div style="font-size:14px;margin:2px 0 0 16px;color:#333">→ ${esc(ans||"(未作答)")}</div>`).join("");
      case "cover": return `<div style="font-size:14px">已閱讀本期文章</div>`;
      case "reading": return `<div style="font-size:14px">答對 ${rec.score!=null?rec.score:"-"} / ${issue.reading.length} 題（最佳連擊 ${rec.best||0}）</div>`;
      case "candy": return `<div style="font-size:14px">單字配對完成，找出 ${rec.score||0} 組</div>`;
      case "sayit": return `<div style="font-size:14px">跟讀練習完成，共 ${rec.score||0} 句</div>`;
      case "grammar": return `<div style="font-size:14px">文法拼句挑戰答對 ${rec.score!=null?rec.score:"-"} 題</div>`;
      case "speakup": return `<div style="font-size:14px">60 秒口說完成，講了 ${rec.seconds||0} 秒，命中 ${rec.targetsHit||0} 個目標句型</div>`;
      case "roleplay": return `<div style="font-size:14px">情境對話完成，好感度 ${rec.score!=null?rec.score:"-"} / ${rec.max||"-"}</div>`;
      case "writing": return `<div style="font-size:14px;font-weight:700">學生寫作（${rec.words||0} 字）：</div>
        <div style="font-size:14px;margin:2px 0 0 16px;white-space:pre-wrap;color:#333">${esc(rec.text||"(空白)")}</div>`;
      case "quiz": return `<div style="font-size:14px">魔王測驗答對 ${rec.score!=null?rec.score:"-"} / ${issue.quiz.questions.length} 題</div>`;
      case "mission": return Object.keys(rec.report||{}).map(q=>`
          <div style="font-size:14px;font-weight:700;margin-top:8px">${esc(q)}</div>
          <div style="font-size:14px;margin:2px 0 0 16px;color:#333">→ ${esc(rec.report[q]||"(未填寫)")}</div>`).join("");
      default: return "";
    }
  }

  let body = `
    <div style="font-family:'Baloo 2','Noto Sans TC',sans-serif;font-size:24px;font-weight:800;color:#2B2440">English POP! · Issue ${esc(issue.id)} — ${esc(issue.title)}</div>
    <div style="font-size:13px;color:#6E6684;font-weight:700;margin-top:8px">學生：${esc(S.student?S.student.name:"—")}　等級：${esc(issue.level)}　匯出時間：${new Date().toLocaleString("zh-TW")}</div>
    <div style="font-size:13px;color:#6E6684;font-weight:700;margin-top:4px">完成度：${doneCount} / ${SECTIONS.length} 關　XP：${S.xp}　連續天數：${S.streak}</div>`;

  SECTIONS.forEach(s=>{
    const rec=p.done[s.key];
    body += `<div style="margin-top:20px;padding-top:12px;border-top:2px solid #E4DEF2">
      <div style="font-size:16px;font-weight:800;color:#2B2440;margin-bottom:6px">${s.emoji} ${esc(s.en)}（${esc(s.zh)}）</div>
      ${rec ? row(s.key,rec) : `<div style="font-size:13px;color:#999">尚未完成這一關</div>`}
    </div>`;
  });

  const wrap=document.createElement("div");
  wrap.style.cssText="position:fixed;left:-9999px;top:0;width:760px;background:#ffffff;padding:32px;font-family:'Nunito','Noto Sans TC',sans-serif;color:#2B2440;line-height:1.6";
  wrap.innerHTML = body;
  document.body.appendChild(wrap);
  toast("📄 產生 PDF 中，請稍候…");

  html2canvas(wrap, {scale:2, backgroundColor:"#ffffff", useCORS:true}).then(canvas=>{
    document.body.removeChild(wrap);
    const doc = new jsPDF({unit:"pt", format:"a4"});
    const pageW=doc.internal.pageSize.getWidth(), pageH=doc.internal.pageSize.getHeight();
    const margin=24, imgW=pageW-margin*2, imgH=canvas.height*imgW/canvas.width;
    const imgData=canvas.toDataURL("image/png");
    let heightLeft=imgH, y=margin;
    doc.addImage(imgData,"PNG",margin,y,imgW,imgH);
    heightLeft -= (pageH-margin*2);
    while(heightLeft > 0){
      y = margin - (imgH - heightLeft);
      doc.addPage();
      doc.addImage(imgData,"PNG",margin,y,imgW,imgH);
      heightLeft -= (pageH-margin*2);
    }
    doc.save(`EnglishPOP_Issue${issue.id}_${(S.student&&S.student.name)||"student"}.pdf`);
    toast("📄 PDF 已匯出！");
  }).catch(err=>{
    if(wrap.parentNode) document.body.removeChild(wrap);
    console.error(err);
    toast("PDF 匯出失敗，請再試一次");
  });
}
